<script>
/* ---------------------------------
   1. UPDATE HEADER TEXT + FIT
----------------------------------*/
document.addEventListener("DOMContentLoaded", function () {
  const header = document.getElementById("rightHeaderText");
  if (header) {
    header.textContent = "Wheel Power Reflections";
    header.style.fontSize = "22px"; // slightly reduced
  }
});


/* ---------------------------------
   2. READ URL PARAMS
----------------------------------*/
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name) || "";
}

const group_id = getParam("group_id") || "INDIVIDUAL";
const group_label = getParam("group_label") || "Individual Reflection";
const cycle_id = getParam("cycle_id") || "";
const steward = getParam("steward");   // <-- ONLY in URL


/* ---------------------------------
   3. CALCULATE ROLLUPS
----------------------------------*/
function calculateAverages(scores) {

  const emotional = Number(scores.emotional || 0);
  const physical = Number(scores.physical || 0);
  const learning = Number(scores.learning || 0);
  const surroundings = Number(scores.surroundings || 0);
  const spiritual = Number(scores.spiritual || 0);
  const social = Number(scores.social || 0);
  const financial = Number(scores.financial || 0);
  const work = Number(scores.work || 0);

  return {
    care: (emotional + physical) / 2,
    pacing: (learning + surroundings) / 2,
    trust: (spiritual + social) / 2,
    alignment: (financial + work) / 2
  };
}


/* ---------------------------------
   4. SUBMIT FUNCTION
----------------------------------*/
async function submitWheel(scores) {

  const rollups = calculateAverages(scores);

  const payload = {
    timestamp_iso: new Date().toISOString(),
    group_id,
    group_label,
    cycle_id,
    source_tool: "wheel_power_v2",

    // map steward → user_email (NOT in URL)
    user_email: steward || "",

    work: scores.work,
    social: scores.social,
    surroundings: scores.surroundings,
    physical: scores.physical,
    financial: scores.financial,
    spiritual: scores.spiritual,
    learning: scores.learning,
    emotional: scores.emotional,

    care: rollups.care,
    pacing: rollups.pacing,
    trust: rollups.trust,
    alignment: rollups.alignment,

    total_score:
      Number(scores.work || 0) +
      Number(scores.social || 0) +
      Number(scores.surroundings || 0) +
      Number(scores.physical || 0) +
      Number(scores.financial || 0) +
      Number(scores.spiritual || 0) +
      Number(scores.learning || 0) +
      Number(scores.emotional || 0),

    page_url: window.location.href
  };

  await fetch("YOUR_WEB_APP_URL_HERE", {
    method: "POST",
    body: new URLSearchParams(payload)
  });

  alert("Reflection saved successfully.");
}
</script>
