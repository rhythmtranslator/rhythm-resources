    button { padding: 10px 14px; border: 2px solid #000; background: #fff; border-radius: 10px; cursor: pointer; font-weight: 700; }
    button:active { transform: translateY(1px); }
    .hint { font-size: 14px; color: #333; line-height: 1.3; }
    .svgbox { border: 2px solid #000; border-radius: 14px; padding: 10px; background: #fff; overflow: auto; }
    .svgbox svg { width: 100%; height: auto; display: block; }
</style>
</head>

<div class="wrap">
  <div class="toolbar">

    <div style="flex: 1;"></div>
    <button id="resetBtn" type="button">Reset</button>
    <button id="downloadBtn" type="button">Download PNG</button>
  </div>

      <rect fill="#ffffff" height="1000" width="1400" x="0" y="0"></rect>

      <g id="masthead" transform="translate(0,-60)">

          <rect x="140" y="20" width="430" height="74" rx="20" ry="20" fill="#000000"></rect>
          <text x="355" y="71"

                font-size="44"
                font-weight="700"

        </g>

          <text x="1115" y="71"

                font-size="44"
                font-weight="700"

        </g>

        <image x="120" y="115" width="110" height="110"

            <text x="18" y="27" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
              1) Is it healthy to be here?
            </text>
          </g>
          <g transform="translate(0,46)">
            <rect x="0" y="0" width="360" height="40" rx="12" ry="12" fill="#F9D400"></rect>
            <text x="18" y="27" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
              2) Can this continue?
            </text>
          </g>
          <g transform="translate(0,92)">
            <rect x="0" y="0" width="360" height="40" rx="12" ry="12" fill="#E53935"></rect>
            <text x="18" y="27" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">

            </text>

              4) Do we know how this works?
            </text>
          </g>
        </g>

<script>
(() => {
  // Fixed slice colors
  const SLICE_COLOR = {
    1: "#2E7D32", // Work
    2: "#E53935", // Social
    3: "#F9D400", // Surroundings
    4: "#0B4DBA", // Physical
    5: "#2E7D32", // Financial
    6: "#E53935", // Spiritual
    7: "#F9D400", // Learning
    8: "#0B4DBA"  // Emotional
  };

  const svg = document.getElementById("wheelSvg");
  const segments = Array.from(svg.querySelectorAll(".segment"));

  function parseId(el) {
    const m = (el.id || "").match(/^seg-r(\d+)-s(\d+)$/);
    if (!m) return null;
    return { ring: parseInt(m[1], 10), slice: parseInt(m[2], 10) };
  }

  function setSliceLevel(slice, level) {
    const color = SLICE_COLOR[slice];
    for (const el of segments) {
      const p = parseId(el);
      if (!p || p.slice !== slice) continue;
      el.style.fill = (p.ring <= level) ? color : "#ffffff";
    }
  }

  function resetAll() {
    for (const el of segments) el.style.fill = "#ffffff";
  }

  // Pointer events: click+drag to paint levels
  let isDown = false;

  function handlePaint(target) {
    const p = parseId(target);
    if (!p) return;
    setSliceLevel(p.slice, p.ring);
  }

  segments.forEach(el => {
    el.setAttribute("tabindex", "0");
    el.addEventListener("pointerdown", (e) => {
      isDown = true;
      el.setPointerCapture?.(e.pointerId);
      handlePaint(el);
      e.preventDefault();
    });
    el.addEventListener("pointerenter", () => {
      if (isDown) handlePaint(el);
    });
    el.addEventListener("pointerup", () => { isDown = false; });
    el.addEventListener("pointercancel", () => { isDown = false; });

    // keyboard support
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        handlePaint(el);
        e.preventDefault();
      }
    });
  });

  window.addEventListener("pointerup", () => { isDown = false; });

  document.getElementById("resetBtn").addEventListener("click", resetAll);

  // Download PNG
  document.getElementById("downloadBtn").addEventListener("click", () => {
    const xml = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([xml], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = 1400;
      canvas.height = 1000;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);

      URL.revokeObjectURL(url);

      const a = document.createElement("a");
      a.download = "wellness-wheel.png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    };
    img.src = url;
  });
})();
</script>
