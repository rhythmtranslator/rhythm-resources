<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Wellness Wheel Coloring (80 Sections)</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .wrap { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 1100px; margin: 0 auto; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    button { padding: 10px 14px; border: 2px solid #000; background: #fff; border-radius: 10px; cursor: pointer; font-weight: 700; }
    button:active { transform: translateY(1px); }
    .hint { font-size: 14px; color: #333; line-height: 1.3; }
    .svgbox { border: 2px solid #000; border-radius: 14px; padding: 10px; background: #fff; overflow: auto; }
    .svgbox svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
  <div class="hint"><b>Click a ring in a slice</b> (fills from center up to that level; clears above)</div>

  <div style="flex: 1;"></div>

  <button id="resetBtn" type="button">Reset</button>
  <button id="downloadBtn" type="button">Save a copy</button>
  <button id="submitBtn" type="button">Submit</button>
  <span id="submitStatus" style="font-weight:700;"></span>
</div>

  <div class="svgbox">
    <svg height="1000" id="wheelSvg" viewBox="0 -80 1400 1080" width="1400"
         xmlns="http://www.w3.org/2000/svg"
         xmlns:xlink="http://www.w3.org/1999/xlink">
      <title>Wellness Wheel - 10 Rings x 8 Segments (80 colorable sections)</title>

      <rect fill="#ffffff" height="1000" width="1400" x="0" y="0"></rect>

      <!-- ===== Masthead (Headers + Logo + 4 Questions) ===== -->
      <g id="masthead" transform="translate(0,-60)">
        <!-- Left header -->
        <g>
          <rect id="groupHeaderRect" x="120" y="20" width="720" height="74" rx="20" ry="20" fill="#000000"></rect>
          <!-- Group header: single-line (default) -->
<text id="groupHeaderSingle"
      x="480" y="71"
      fill="#ffffff"
      font-family="Arial, Helvetica, sans-serif"
      font-size="44"
      font-weight="700"
      text-anchor="middle">Individual Reflection</text>

<!-- Group header: two-line (shown only when needed) -->
<text id="groupHeaderMulti"
      x="480" y="56"
      fill="#ffffff"
      font-family="Arial, Helvetica, sans-serif"
      font-size="34"
      font-weight="700"
      text-anchor="middle"
      style="display:none;">
  <tspan id="groupHeaderLine1" x="480" dy="0">Individual</tspan>
  <tspan id="groupHeaderLine2" x="480" dy="30">Reflection</tspan>
</text>
        </g>

        <!-- Right header -->
        <g>
          <rect x="880" y="20" width="470" height="74" rx="20" ry="20" fill="#000000"></rect>
          <text x="1115" y="71"
                fill="#ffffff"
                font-family="Arial, Helvetica, sans-serif"
                font-size="36"
                font-weight="700"
                text-anchor="middle"> Wheel Power Reflections </text>
        </g>
          <!-- Dynamic group label (set via URL params in JS) -->

        <!-- Logo (uses your real PNG file in the repo) -->
        <!-- Upload: "HOUR Transparent Logo.png" next to index.html -->
        

        <!-- 4 questions pills (upper right) -->
        <g id="questions" transform="translate(980,110)">
          <g>
            <rect x="0" y="0" width="360" height="40" rx="12" ry="12" fill="#0B4DBA"></rect>
            <text x="18" y="27" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
              1) Is it healthy to be here?
            </text>
          </g>
          <g transform="translate(0,46)">
            <rect x="0" y="0" width="360" height="40" rx="12" ry="12" fill="#F9D400"></rect>
            <text x="18" y="27" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
              2) Can this continue?
            </text>
          </g>
          <g transform="translate(0,92)">
            <rect x="0" y="0" width="360" height="40" rx="12" ry="12" fill="#E53935"></rect>
            <text x="18" y="27" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
              3) Are we together?
            </text>
          </g>
          <g transform="translate(0,138)">
            <rect x="0" y="0" width="360" height="40" rx="12" ry="12" fill="#2E7D32"></rect>
            <text x="18" y="27" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
              4) Do we know how this works?
            </text>
          </g>
        </g>
      </g>

function splitCandidates(label) {
  const s = (label || "").trim();
  if (!s) return [{ a: "", b: "" }];

  // Prefer splitting on spaces; then hyphens; else fallback to midpoint.
  const seps = s.includes(" ") ? [" "] : (s.includes("-") ? ["-"] : []);
  const out = [];

  if (seps.length) {
    const sep = seps[0];
    const parts = s.split(sep);

    // Build candidate split points near the middle for best balance.
    const mid = Math.floor(parts.length / 2);
    const offsets = [0, -1, 1, -2, 2, -3, 3];

    for (const off of offsets) {
      const i = mid + off;
      if (i <= 0 || i >= parts.length) continue;

      const a = parts.slice(0, i).join(sep).trim();
      const b = parts.slice(i).join(sep).trim();
      out.push({ a, b });
    }
  } else {
    // Hard fallback: character midpoint
    const m = Math.floor(s.length / 2);
    out.push({ a: s.slice(0, m).trim(), b: s.slice(m).trim() });
  }

  // Always include first/last-ish fallbacks
  out.push({ a: s.slice(0, 28).trim(), b: s.slice(28).trim() });
  return out.filter(x => x.a || x.b);
}

function ellipsizeToWidth(tspanEl, maxWidth) {
  let txt = (tspanEl.textContent || "").trim();
  if (!txt) return;

  // If already fits, done.
  if (tspanEl.getComputedTextLength() <= maxWidth) return;

  // Trim until it fits, then add ellipsis.
  while (txt.length > 0 && tspanEl.getComputedTextLength() > maxWidth) {
    txt = txt.slice(0, -1);
    tspanEl.textContent = txt + "…";
  }
}

function setTwoLineWrappedText({ line1El, line2El, rectEl, label, padding = 28 }) {
  if (!line1El || !line2El) return;

  const full = (label || "").trim();
  if (!full) {
    line1El.textContent = "";
    line2El.textContent = "";
    return;
  }

  const maxWidth = rectEl
    ? (Number(rectEl.getAttribute("width")) - padding)
    : 520; // fallback max width if no rect provided

  // Try balanced splits first.
  const cands = splitCandidates(full);

  let best = null;
  let bestScore = Infinity;

  for (const c of cands) {
    line1El.textContent = c.a;
    line2El.textContent = c.b;

    const w1 = line1El.getComputedTextLength();
    const w2 = line2El.getComputedTextLength();

    // Penalize overflow heavily; otherwise prefer balanced lines.
    const overflow = Math.max(0, w1 - maxWidth) + Math.max(0, w2 - maxWidth);
    const balance = Math.abs(w1 - w2);
    const score = overflow * 1000 + balance;

    if (score < bestScore) {
      bestScore = score;
      best = { ...c, w1, w2 };
    }
  }

  // Apply the best split
  line1El.textContent = best?.a || full;
  line2El.textContent = best?.b || "";

  // If either line still overflows, ellipsize the second line first
  if (line2El.textContent) {
    ellipsizeToWidth(line2El, maxWidth);
  }

  // If line1 still overflows (rare), ellipsize it too
  ellipsizeToWidth(line1El, maxWidth);
}
function fitTextToRect(textEl, rectEl, padding = 28, minFontSize = 20) {
  if (!textEl || !rectEl) return;

  // Reset any prior fitting
  textEl.removeAttribute("transform");
  textEl.style.fontSize = ""; // use SVG attribute font-size if present

  const maxWidth = Number(rectEl.getAttribute("width")) - padding;

  // Start from the current rendered font-size
  let fontSize = parseFloat(window.getComputedStyle(textEl).fontSize) || 44;

  // Safety loop: shrink until it fits or hits minFontSize
  for (let i = 0; i < 40; i++) {
    const w = textEl.getComputedTextLength();
    if (w <= maxWidth) break;
    fontSize -= 1;
    if (fontSize < minFontSize) { fontSize = minFontSize; break; }
    textEl.style.fontSize = `${fontSize}px`;
  }
}

      if (isDown) handlePaint(el);

        e.preventDefault();
