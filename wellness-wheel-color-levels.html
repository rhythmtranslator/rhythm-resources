<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wellness Wheel Coloring (80 Sections)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .wrap { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 1100px; margin: 0 auto; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .swatch { width: 34px; height: 34px; border: 2px solid #000; border-radius: 8px; cursor: pointer; box-sizing: border-box; }
    .swatch.selected { outline: 3px solid #000; outline-offset: 2px; }
    button { padding: 10px 14px; border: 2px solid #000; background: #fff; border-radius: 10px; cursor: pointer; font-weight: 700; }
    button:active { transform: translateY(1px); }
    .hint { font-size: 14px; color: #333; line-height: 1.3; }
    .svgbox { border: 2px solid #000; border-radius: 14px; padding: 10px; background: #fff; overflow: auto; }
    /* Make the SVG responsive */
    .svgbox svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <div class="hint">
        <b>Pick a color</b>, then click a section to fill it.<br/>
        Tip: you can also <b>click + drag</b> to paint multiple sections quickly. (10 rings × 8 slices = 80)
      </div>
      <div style="flex: 1;"></div>
      <button id="resetBtn" type="button">Reset</button>
      <button id="downloadBtn" type="button">Download PNG</button>
    </div>

    <div class="toolbar" id="palette" aria-label="Color palette">
      <!-- swatches inserted by JS -->
    </div>

<script>
(() => {
  const COLORS = [
    "#000000","#ffffff","#ff3b30","#ff9500","#ffcc00","#34c759","#0a84ff","#5856d6",
    "#ff2d55","#8e8e93","#64d2ff","#30d158","#ffd60a","#bf5af2","#ac8e68","#1c1c1e"
  ];

  let currentColor = COLORS[2]; // default red-ish

  const palette = document.getElementById("palette");

  function makeSwatch(color, selected=false) {
    const d = document.createElement("div");
    d.className = "swatch" + (selected ? " selected" : "");
    d.style.background = color;
    d.title = color;
    d.dataset.color = color;
    d.setAttribute("role","button");
    d.setAttribute("tabindex","0");
    d.addEventListener("click", () => selectColor(color));
    d.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        selectColor(color);
      }
    });
    return d;
  }

  function selectColor(color) {
    currentColor = color;
    document.querySelectorAll(".swatch").forEach(s => {
      s.classList.toggle("selected", s.dataset.color === color);
    });
  }

  // Build palette
  COLORS.forEach((c, i) => palette.appendChild(makeSwatch(c, i === 2)));

  const svg = document.getElementById("wheelSvg");
  if (!svg) {
    alert("Could not find the SVG element (#wheelSvg).");
    return;
  }

  // Helps click+drag painting on touch devices
  svg.style.touchAction = "none";

  const segments = svg.querySelectorAll(".segment");
  if (!segments.length) {
    alert("Could not find any .segment paths inside the SVG.");
    return;
  }

  // Index segments by slice + ring so we can "fill from center outward"
// Expected id format: seg-r01-s1 ... seg-r10-s8
const bySlice = new Map(); // slice -> Map(ring -> element)

function parseSegId(id) {
  // Returns { ring: 1..10, slice: 1..8 } or null
  const m = /^seg-r(\d{2})-s(\d+)$/.exec(id || "");
  if (!m) return null;
  return { ring: parseInt(m[1], 10), slice: parseInt(m[2], 10) };
}

segments.forEach(seg => {
  const info = parseSegId(seg.id);
  if (!info) return;
  if (!bySlice.has(info.slice)) bySlice.set(info.slice, new Map());
  bySlice.get(info.slice).set(info.ring, seg);
});

function setSliceLevel(slice, levelRing, color) {
  const ringMap = bySlice.get(slice);
  if (!ringMap) return;

  for (let r = 1; r <= 10; r++) {
    const el = ringMap.get(r);
    if (!el) continue;
    if (r <= levelRing) {
      // IMPORTANT: inline style overrides SVG default CSS fill
      el.style.fill = color;
    } else {
      // Clear inline fill so it falls back to default (white)
      el.style.fill = "";
    }
  }
}

function clearSlice(slice) {
  setSliceLevel(slice, 0, "");
}

  // Make segments keyboard-focusable
  segments.forEach(seg => {
    seg.setAttribute("tabindex", "0");
    seg.setAttribute("role", "button");
    seg.setAttribute("aria-label", seg.id || "segment");

    // Basic click/tap paint
    seg.addEventListener("click", (e) => {
      const info = parseSegId(seg.id);
      if (info) setSliceLevel(info.slice, info.ring, currentColor);
    });

    // Right-click to erase (desktop convenience)
    seg.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      const info = parseSegId(seg.id);
      if (info) clearSlice(info.slice);
    });

    // Keyboard: Enter/Space paints; Delete/Backspace clears
    seg.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        const info = parseSegId(seg.id);
      if (info) setSliceLevel(info.slice, info.ring, currentColor);
      } else if (e.key === "Backspace" || e.key === "Delete") {
        e.preventDefault();
        const info = parseSegId(seg.id);
      if (info) clearSlice(info.slice);
      }
    });
  });

  // Click + drag painting
  let painting = false;

  svg.addEventListener("pointerdown", (e) => {
    const t = e.target;
    if (t && t.classList && t.classList.contains("segment")) {
      painting = true;
      const info = parseSegId(t.id);
      if (info) setSliceLevel(info.slice, info.ring, currentColor);
      e.preventDefault();
    }
  });

  svg.addEventListener("pointermove", (e) => {
    if (!painting) return;
    const t = e.target;
    if (t && t.classList && t.classList.contains("segment")) {
      const info = parseSegId(t.id);
      if (info) setSliceLevel(info.slice, info.ring, currentColor);
    }
  });

  window.addEventListener("pointerup", () => { painting = false; });
  window.addEventListener("pointercancel", () => { painting = false; });

  // Fallback for older browsers without PointerEvent (some older iOS/Safari setups)
  if (!("PointerEvent" in window)) {
    let touchPainting = false;

    function handleTouch(e) {
      if (!e.touches || !e.touches.length) return;
      const t = e.touches[0];
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (el && el.classList && el.classList.contains("segment")) {
        const info = parseSegId(el.id);
        if (info) setSliceLevel(info.slice, info.ring, currentColor);
      }
    }

    svg.addEventListener("touchstart", (e) => {
      touchPainting = true;
      handleTouch(e);
      e.preventDefault();
    }, { passive: false });

    svg.addEventListener("touchmove", (e) => {
      if (!touchPainting) return;
      handleTouch(e);
      e.preventDefault();
    }, { passive: false });

    window.addEventListener("touchend", () => { touchPainting = false; }, { passive: true });
    window.addEventListener("touchcancel", () => { touchPainting = false; }, { passive: true });
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    segments.forEach(seg => { seg.style.fill = ""; });
  });

  document.getElementById("downloadBtn").addEventListener("click", () => {
    // Serialize SVG -> draw to canvas -> download PNG
    const serializer = new XMLSerializer();
    const svgClone = svg.cloneNode(true);

    // Ensure xmlns is present for serialization
    svgClone.setAttribute("xmlns", "http://www.w3.org/2000/svg");

    const svgString = serializer.serializeToString(svgClone);
    const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const vb = svg.viewBox.baseVal;
      canvas.width = (vb && vb.width) ? vb.width : svg.width.baseVal.value;
      canvas.height = (vb && vb.height) ? vb.height : svg.height.baseVal.value;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      URL.revokeObjectURL(url);

      canvas.toBlob((blob) => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "wellness-wheel.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 2000);
      }, "image/png");
    };

    img.onerror = () => {
      URL.revokeObjectURL(url);
      alert("Download failed in this browser. Try Chrome/Edge.");
    };

    img.src = url;
  });
})();
</script>
</body>
</html>
